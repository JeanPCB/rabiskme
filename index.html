<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/favicon/favicon-16x16.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Rabiskme</title>
  </head>
  <body>
    <aside class="sidebar">
      <header>
        <h1>Etch-a-Sketch</h1>
      </header>

      <div>
        <p>Brush Color:</p>
        <input type="color" id="brush-color" />
      </div>

      <div>
        <p>
          Board Size <small>(blocks)</small>:
          <span id="board-size-display"></span>
        </p>
        <input type="range" id="board-sizer" min="16" max="64" />
      </div>

      <div>
        <p>Quick Colors:</p>
        <div id="quick-col-container">
          <div
            style="background-color: #000"
            id="quick-col-1"
            class="quick-color"
          ></div>

          <div
            style="background-color: #f00"
            id="quick-col-2"
            class="quick-color"
          ></div>

          <div
            style="background-color: #0f0"
            id="quick-col-3"
            class="quick-color"
          ></div>

          <div
            style="background-color: #00f"
            id="quick-col-4"
            class="quick-color"
          ></div>

          <div
            style="background-color: #ff0"
            id="quick-col-5"
            class="quick-color"
          ></div>

          <div
            style="background-color: #f0f"
            id="quick-col-6"
            class="quick-color"
          ></div>

          <div
            style="background-color: #0ff"
            id="quick-col-7"
            class="quick-color"
          ></div>

          <div
            style="background-color: #fff"
            id="quick-col-8"
            class="quick-color"
          ></div>
        </div>
      </div>

      <div>
        <button type="button" id="rainbow-btn">Rainbow Mode</button>
      </div>
    </aside>
    <div id="board-wrapper"></div>
    <script src="./js/main.js" type="module"></script>
  </body>
</html>
