<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/favicon/favicon-16x16.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Rabiskme</title>
  </head>
  <body>
    <aside class="sidebar">
      <header>
        <h1>Etch-a-Sketch</h1>
      </header>

      <div>
        <p>Brush Color:</p>
        <input type="color" id="brush-color" />
      </div>

      <div>
        <p>Board Size (px): <span id="board-size-display"></span></p>
        <input type="range" id="board-sizer" min="16" max="64" />
      </div>
    </aside>
    <div id="board-wrapper"></div>
    <script src="./js/main.js" type="module"></script>
  </body>
</html>
